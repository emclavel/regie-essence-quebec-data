name: Mises à jour programmées des prix de l’essence (heure Québec)

permissions:
  contents: write

on:
  schedule:
    # 05 h, 06 h, 07 h, 12 h, 16 h HEURE DU QUÉBEC (UTC‑4)
    - cron: "0 9,10,11,16,20 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python3 -m pip install requests

      - name: Run fetch script
        run: python3 fetch_regie_essence.py

      - name: Commit CSV if changed
        shell: bash
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          # ✅ IMPORTANT : ajouter TOUS les CSV (y compris les nouveaux)
          git add data/*.csv

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Scheduled update of fuel prices (QC time)"
            git push
          fi
