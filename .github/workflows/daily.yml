name: Mise à jour quotidienne des prix de l’essence

on:
  schedule:
    - cron: "0 5 * * *"   # chaque jour à 5h UTC
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install requests

      - name: Run script
        run: |
          python fetch_regie_essence.py

      - name: Commit CSV
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/regie_essence_quebec.csv
          git commit -m "Daily update" || echo "No changes"
          git push
``
